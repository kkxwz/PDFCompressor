name: Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'  # Trigger on v1.0.0 etc. tags
  workflow_dispatch:  # Support manual trigger

permissions:
  contents: write

jobs:
  # ============================================
  # macOS Build (Intel + Apple Silicon Universal)
  # ============================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Ghostscript
        run: |
          brew install ghostscript
          echo "GS_PATH=$(which gs)" >> $GITHUB_ENV

      - name: Prepare Ghostscript binary
        run: |
          echo "Project root: $(pwd)"
          echo "File list:"
          ls -la
          mkdir -p vendor/ghostscript
          cp "$GS_PATH" vendor/ghostscript/gs
          chmod +x vendor/ghostscript/gs
          # Collect Resource files
          GS_SHARE=$(dirname $(dirname "$GS_PATH"))/share/ghostscript
          if [ -d "$GS_SHARE" ]; then
            GS_VER=$(ls "$GS_SHARE" | head -1)
            if [ -d "$GS_SHARE/$GS_VER/Resource" ]; then
              mkdir -p vendor/ghostscript/share/$GS_VER
              cp -r "$GS_SHARE/$GS_VER/Resource" vendor/ghostscript/share/$GS_VER/
            fi
          fi
          echo "Ghostscript version: $($GS_PATH --version)"

      - name: PyInstaller Build
        run: pyinstaller build.spec --clean --noconfirm

      - name: Create DMG
        run: |
          if [ -d "dist/PDF Compressor.app" ]; then
            hdiutil create -volname "PDF Compressor" \
              -srcfolder "dist/PDF Compressor.app" \
              -ov -format UDZO \
              dist/PDFCompressor-macOS.dmg
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PDFCompressor-macOS
          path: |
            dist/PDFCompressor-macOS.dmg
            dist/PDF Compressor.app

  # ============================================
  # Windows x64 Build
  # ============================================
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Ghostscript
        shell: pwsh
        run: |
          # Download Ghostscript Windows x64
          $gsUrl = "https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10040/ghostscript-10.04.0-win64.zip"
          # Try chocolatey install
          choco install ghostscript --no-progress -y
          $gsPath = (Get-Command gswin64c -ErrorAction SilentlyContinue).Source
          if (-not $gsPath) {
            # Search common install paths
            $searchPaths = @(
              "C:\Program Files\gs\*\bin\gswin64c.exe",
              "C:\Program Files (x86)\gs\*\bin\gswin64c.exe"
            )
            foreach ($pattern in $searchPaths) {
              $found = Get-Item $pattern -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) { $gsPath = $found.FullName; break }
            }
          }
          if ($gsPath) {
            Write-Host "Found Ghostscript: $gsPath"
            $binDir = Split-Path $gsPath -Parent
            $destDir = "vendor\ghostscript\x64"
            New-Item -ItemType Directory -Force -Path $destDir | Out-Null
            Copy-Item "$gsPath" "$destDir\" -Force
            Copy-Item "$binDir\*.dll" "$destDir\" -Force
            $libDir = Join-Path (Split-Path $binDir -Parent) "lib"
            if (Test-Path $libDir) {
              Copy-Item -Recurse -Force "$libDir" "$destDir\lib"
            }
          } else {
            Write-Host "WARNING: Ghostscript not found, build may fail"
          }

      - name: PyInstaller Build
        run: pyinstaller build.spec --clean --noconfirm --log-level=DEBUG

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PDFCompressor-Windows-x64
          path: dist/PDFCompressor.exe

  # ============================================
  # Release
  # ============================================
  release:
    needs: [build-macos, build-windows-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PDFCompressor-macOS/PDFCompressor-macOS.dmg
            artifacts/PDFCompressor-Windows-x64/PDFCompressor.exe
          generate_release_notes: true
          draft: false
